<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Vegas Slot</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Segoe UI;
}

body{

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

background:
radial-gradient(circle at 30% 20%, #350066, #000),
linear-gradient(135deg,#150022,#000);

color:white;
}

/* MACHINE */

.machine{

padding:40px;

border-radius:30px;

background:linear-gradient(145deg,#2a003d,#12001c);

box-shadow:
0 0 60px #ff00ff55,
inset 0 0 40px #000;

width:100%;
max-width:650px;

text-align:center;
}

/* TITLE */

.title{

font-size:32px;

color:#ffd700;

text-shadow:0 0 20px gold;

margin-bottom:15px;

}

/* PANEL */

.panel{

display:flex;
justify-content:space-between;

margin-bottom:15px;

font-size:20px;

}

.balance{color:#00ffcc}
.bet{color:#ffaa00}

/* REELS */

.reels{

display:flex;

justify-content:center;

gap:20px;

margin:30px 0;

}

.window{

width:140px;
height:140px;

overflow:hidden;

border-radius:18px;

border:2px solid gold;

background:black;

box-shadow:
0 0 20px #ff00ff,
inset 0 0 20px #000;

}

.reel{

display:flex;
flex-direction:column;

transition:transform 2s cubic-bezier(.1,.7,.1,1);

}

/* SYMBOL */

.symbol{

height:140px;

display:flex;
align-items:center;
justify-content:center;

font-size:95px;

background: #000; /* фон для избежания просветов */

}

/* BUTTON */

button{

background:linear-gradient(#ffd700,#ff9900);

border:none;

font-size:18px;

padding:10px 30px;

border-radius:12px;

cursor:pointer;

font-weight:bold;

box-shadow:
0 6px 0 #b86f00,
0 0 15px #ffaa00;

margin:5px;

}

button:active{

transform:translateY(6px);
box-shadow:none;

}

/* RESULT */

.result{

margin-top:10px;

font-size:22px;

min-height:28px;

}

.win{

color:#00ff90;

text-shadow:0 0 20px #00ff90;

}

/* MOBILE */

@media (max-width:600px){

.window{
width:90px;
height:90px;
}

.symbol{
font-size:60px;
height:90px;
}

}

</style>
</head>

<body>

<div class="machine">

<div class="title">🎰 VEGAS SLOT</div>

<div class="panel">

<div class="balance">
💰 <span id="coins"></span>
</div>

<div class="bet">
🎲 Bet: <span id="bet"></span>
</div>

</div>

<div class="reels">

<div class="window"><div class="reel" id="r1"></div></div>
<div class="window"><div class="reel" id="r2"></div></div>
<div class="window"><div class="reel" id="r3"></div></div>

</div>

<button onclick="spin()">SPIN</button>
<button onclick="changeBet(1)">BET +</button>
<button onclick="changeBet(-1)">BET -</button>

<div class="result" id="result"></div>

</div>

<script>

/* SYMBOLS */

const symbols=["🍒","🍋","🍇","⭐","💎","7️⃣"];

/* REELS */

const reels=[r1,r2,r3];

/* DATA */

let coins=Number(localStorage.getItem("coins"))||500;
let bet=10;

const coinsEl=document.getElementById("coins");
const betEl=document.getElementById("bet");
const resultEl=document.getElementById("result");

/* SOUNDS */

const spinSound=new Audio("https://actions.google.com/sounds/v1/casino/slot_machine.ogg");

const winSound=new Audio("https://actions.google.com/sounds/v1/cartoon/concussive_drum_hit.ogg");

const smallWinSound=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

/* BUILD REEL - ИСПРАВЛЕНО */

function buildReel(reel){

reel.innerHTML="";

// Создаем больше символов и дублируем их для бесшовной прокрутки
for(let i=0;i<50;i++){

let div=document.createElement("div");
div.className="symbol";

div.textContent=symbols[Math.floor(Math.random()*symbols.length)];

reel.appendChild(div);

}

// Добавляем несколько первых символов в конец для зацикливания
for(let i=0;i<5;i++){

let div=document.createElement("div");
div.className="symbol";

div.textContent=reel.children[i].textContent;

reel.appendChild(div);

}

}

reels.forEach(buildReel);

/* UPDATE UI */

function updateUI(){

coinsEl.textContent=coins;
betEl.textContent=bet;

localStorage.setItem("coins",coins);

}

/* BET */

function changeBet(v){

bet=Math.max(1,bet+v);

updateUI();

}

/* SPIN - ИСПРАВЛЕНО */

function spin(){

if(coins<bet){

resultEl.textContent="Недостаточно монет";
return;

}

coins-=bet;

updateUI();

spinSound.currentTime=0;
spinSound.play();

resultEl.textContent="Крутится...";

reels.forEach(buildReel);

reels.forEach((reel,i)=>{

reel.style.transition="none";
reel.style.transform="translateY(0px)";

setTimeout(()=>{

reel.style.transition=`transform ${2+i*0.4}s cubic-bezier(0.1, 0.7, 0.1, 1)`;

// Вычисляем высоту символа в зависимости от размера экрана
const symbolHeight = window.innerWidth <= 600 ? 90 : 140;

// Останавливаемся на позиции, кратной высоте символа
let stop = 15 + Math.floor(Math.random() * symbols.length);
let offset = stop * symbolHeight;

reel.style.transform=`translateY(-${offset}px)`;

if(i===2){

setTimeout(checkWin, 2500);

}

},20);

});

}

/* GET SYMBOL - ИСПРАВЛЕНО */

function getSymbol(reel){

const matrix=getComputedStyle(reel).transform;

let y=0;

if(matrix && matrix !== "none"){

const values=matrix.split(",");

if(values.length > 5){

y=Math.abs(parseInt(values[5]));

}

}

// Вычисляем высоту символа в зависимости от размера экрана
const symbolHeight = window.innerWidth <= 600 ? 90 : 140;

// Округляем до ближайшего целого и берем по модулю количество символов
let index = Math.round(y/symbolHeight);

// Добавляем проверку на выход за границы
if(index >= reel.children.length){

index = reel.children.length - 1;

}

return reel.children[index].textContent;

}

/* WIN - ИСПРАВЛЕНО */

function checkWin(){

// Небольшая задержка для гарантии завершения анимации
setTimeout(() => {

let a=getSymbol(r1);
let b=getSymbol(r2);
let c=getSymbol(r3);

console.log("Symbols:", a, b, c); // для отладки

let win=0;

if(a===b && b===c){

win=bet*10;

winSound.play();

resultEl.textContent="🎉 ДЖЕКПОТ! +"+win;

}

else if(a===b || b===c || a===c){

win=bet*3;

smallWinSound.play();

resultEl.textContent="🎁 ВЫИГРЫШ! +"+win;

}

if(win>0){

coins+=win;

resultEl.className="result win";

}else{

resultEl.textContent="Попробуй ещё";

resultEl.className="result";

}

updateUI();

}, 100); // небольшая задержка

}

updateUI();

</script>

</body>
</html>
